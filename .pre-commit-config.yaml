repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: export-papers-md
        name: Export papers.md
        entry: bash -c 'if [ -f data/larklab.db ]; then pixi run db-export --md && git add data/papers.md; fi'
        language: system
        always_run: true
        pass_filenames: false
